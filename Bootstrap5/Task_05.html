<!--Task 5: Alignment and Reordering in Grid-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Alignment and Reordering</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">

    <div class="container">
        <h2 class="mb-4 text-secondary text-center">Alignment and Reordering Matrix</h2>
        
        <!-- Exercise 5.1: Centered content using justify-content-center and align-items-center -->
        <div class="row justify-content-center align-items-center bg-white border rounded p-4 shadow-sm" style="min-height: 350px;">
            
            <!-- Exercise 5.2: Reorder columns using responsive order modifiers -->
            <div class="col-sm-5 order-md-2 my-2">
                <div class="p-4 bg-warning text-dark text-center fw-bold rounded border shadow-sm">
                    Block Alpha<br>
                    <small class="fw-normal">First on mobile, second on desktop (order-md-2)</small>
                </div>
            </div>
            
            <div class="col-sm-5 order-md-1 my-2">
                <div class="p-4 bg-info text-white text-center fw-bold rounded border shadow-sm">
                    Block Beta<br>
                    <small class="fw-normal">Second on mobile, first on desktop (order-md-1)</small>
                </div>
            </div>

        </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
