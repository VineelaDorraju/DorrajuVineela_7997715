<!--Task 6: Responsive Flexbox Utilities-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Systems</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- Exercise 6 (7.1): Navbar utilizing dynamic flexbox direction transformations -->
    <header class="p-3 bg-dark text-white border-bottom shadow-sm">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <span class="fs-4 fw-bold mb-2 mb-md-0 text-info">Control Hub Network</span>
            <nav class="d-flex gap-3">
                <a href="#" class="text-white text-decoration-none">Cluster Metrics</a>
                <a href="#" class="text-white text-decoration-none">Storage Nodes</a>
                <a href="#" class="text-white text-decoration-none">System Knobs</a>
            </nav>
        </div>
    </header>

    <!-- Exercise 6 (7.2): Card element incorporating space distribution modifiers -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title m-0 text-primary">Process Management Ledger</h5>
                            <span class="badge bg-success px-2 py-1">Node Active</span>
                        </div>
                        
                        <p class="card-text text-muted">Core clustering layout parameters mapped and running smoothly across all active resource channels.</p>
                        
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <small class="text-secondary fw-bold">Refreshed 10s ago</small>
                            <button class="btn btn-sm btn-outline-primary px-3">Review Matrix</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
