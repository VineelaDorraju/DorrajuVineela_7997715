<!--Task 17: Icons with Bootstrap Icons-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Layout Icons Dashboard</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <!-- Local relative link reference pointing into npm installed vector glyphs sheet -->
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
</head>
<body class="bg-light py-5">

    <div class="container text-center bg-white border p-5 rounded shadow-sm" style="max-width: 650px;">
        <!-- Exercise 17.2: Text Buttons replaced with vector graphic control buttons exclusively -->
        <h3 class="text-secondary mb-4">Icon-Only UI Controls Matrix</h3>
        <div class="d-flex justify-content-center gap-3 mb-5">
            <button class="btn btn-outline-primary" aria-label="Step Previous"><i class="bi bi-chevron-left"></i></button>
            <button class="btn btn-success" aria-label="Play Stream"><i class="bi bi-play-fill"></i></button>
            <button class="btn btn-danger" aria-label="Stop Engine"><i class="bi bi-stop-fill"></i></button>
            <button class="btn btn-outline-primary" aria-label="Step Advance"><i class="bi bi-chevron-right"></i></button>
        </div>

        <hr class="my-4">

        <!-- Exercise 17.1: Anchor elements implementing vector configurations markup -->
        <h3 class="text-secondary mb-3">Footer Social Anchors Block</h3>
        <div class="d-flex justify-content-center gap-4 fs-3">
            <a href="#" class="text-primary" aria-label="LinkedIn Profile"><i class="bi bi-linkedin"></i></a>
            <a href="#" class="text-dark" aria-label="GitHub Repository"><i class="bi bi-github"></i></a>
            <a href="#" class="text-danger" aria-label="YouTube Channel"><i class="bi bi-youtube"></i></a>
        </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
