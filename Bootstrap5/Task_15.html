<!--Task 15: Borders, Shadows, and Rounded Corners-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders, Shadows, and Curves</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">

    <div class="container text-center" style="max-width: 600px;">
        <!-- Exercise 15.1: Circular Image with Accent Borders -->
        <h3 class="text-secondary mb-4">Border Utilities</h3>
        <div class="mb-5">
            <img src="https://unsplash.com" 
                 class="border border-primary border-3 rounded-circle" 
                 alt="Profile Matrix Element" 
                 style="width: 120px; height: 120px; object-fit: cover;">
        </div>

        <hr class="my-4">

        <!-- Exercise 15.2: Pill Pill Shape Component Layout containing Elevated Shadows -->
        <h3 class="text-secondary mb-4">Shadow and Curve Ensembles</h3>
        <div class="card shadow-lg rounded-pill border-0 p-3 bg-white text-dark mx-auto" style="max-width: 450px;">
            <div class="card-body">
                <p class="m-0 fw-bold text-primary">Elevated Capsule Interface</p>
                <small class="text-muted">Rounded-pill structure matching shadow-lg utility parameters.</small>
            </div>
        </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
