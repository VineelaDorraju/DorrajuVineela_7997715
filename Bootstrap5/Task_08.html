<!--Task 8: Forms Utilities-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Forms Matrix</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">

    <div class="container" style="max-width: 700px;">
        <!-- Exercise 8.1: Structural Registration Form Components -->
        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="card-title m-0">Account Registration</h4>
            </div>
            <div class="card-body p-4">
                <form onsubmit="event.preventDefault();">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Choose Handle</label>
                        <div class="input-group">
                            <span class="input-group-text">@</span>
                            <input type="text" class="form-control" placeholder="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck">
                            <label class="form-check-label" for="termsCheck">
                                I accept the platform terms of service parameters.
                            </label>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100">Submit Application</button>
                </form>
            </div>
        </div>

        <!-- Exercise 8.2: Login Layout Using Floating Labels -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h4 class="card-title m-0">Secure Gateway Access</h4>
            </div>
            <div class="card-body p-4">
                <form onsubmit="event.preventDefault();">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
                        <label for="floatingEmail">Email address</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Password Key</label>
                    </div>

                    <button class="btn btn-dark w-100">Authenticate Gateway</button>
                </form>
            </div>
        </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
