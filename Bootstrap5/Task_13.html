<!--Task 13: Colors and Backgrounds-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors and Backgrounds Hub</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- Exercise 13.2: Top bar utilizing linear color modifications (.bg-gradient) -->
    <div class="bg-dark bg-gradient text-white p-4 mb-4 shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="m-0 fw-bold tracking-tight">System Status Dashboard</h2>
            <span class="badge bg-light text-dark fw-bold uppercase">Engine v5.3</span>
        </div>
    </div>

    <!-- Exercise 13.1: Contextual Background Grid Metric Blocks -->
    <main class="container py-4">
        <div class="row g-4 text-center">
            
            <div class="col-sm-6 col-md-3">
                <div class="p-4 bg-primary text-white rounded shadow-sm">
                    <h6 class="text-uppercase text-white-50 small mb-2">Network Ingress</h6>
                    <h3 class="fw-bold m-0">1.2 TB / s</h3>
                </div>
            </div>

            <div class="col-sm-6 col-md-3">
                <div class="p-4 bg-success text-white rounded shadow-sm">
                    <h6 class="text-uppercase text-white-50 small mb-2">Cluster Nodes</h6>
                    <h3 class="fw-bold m-0">99.98% Up</h3>
                </div>
            </div>

            <div class="col-sm-6 col-md-3">
                <div class="p-4 bg-warning text-dark rounded shadow-sm">
                    <h6 class="text-uppercase text-dark-50 small mb-2">Resource Queue</h6>
                    <h3 class="fw-bold m-0">14 Pending</h3>
                </div>
            </div>

            <div class="col-sm-6 col-md-3">
                <div class="p-4 bg-danger text-white rounded shadow-sm">
                    <h6 class="text-uppercase text-white-50 small mb-2">System Faults</h6>
                    <h3 class="fw-bold m-0">0 Critical</h3>
                </div>
            </div>

        </div>
    </main>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
