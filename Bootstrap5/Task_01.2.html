<!--Task 1.2: Setting Up Bootstrap 5 via npm node_modules-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 npm Setup</title>
    <!-- Direct relative path linking the local npm styles sheet asset -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light text-dark">

    <div class="container my-5 text-center">
        <h1 class="display-4 text-success">Bootstrap 5 Local Package</h1>
        <p class="lead">Compiled style sheets resolved directly from local node modules dependency tree.</p>
    </div>

    <!-- Direct relative path linking the local npm bundle javascript asset -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
